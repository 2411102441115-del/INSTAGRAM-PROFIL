<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Profile SHIFA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Header -->
  <header class="p-4 flex items-center justify-between border-b bg-white sticky top-0">
    <h1 class="text-xl font-bold">Instagram</h1>
    <nav>
      <button class="px-3 py-1 bg-blue-500 text-white rounded-lg text-sm md:px-4 md:py-2">
        Login
      </button>
    </nav>
  </header>

  <!-- Profile Section -->
  <section class="max-w-4xl mx-auto p-4 flex flex-col md:flex-row md:items-center md:gap-8">
    <!-- Avatar -->
    <div class="flex justify-center md:order-2">
      <img src="F1.jpeg"
           alt="profile"
           class="rounded-full w-28 h-28 md:w-36 md:h-36 lg:w-44 lg:h-44 shadow-md">
    </div>

    <!-- Bio -->
    <div class="flex-1 mt-4 md:mt-0 md:order-1">
      <div class="flex items-center gap-4 mb-4">
        <h2 class="text-xl font-semibold">shrfmld15</h2>
        <button class="px-3 py-1 text-sm bg-blue-500 text-white rounded-md sm:px-4 sm:py-2 md:px-5 md:py-2">
          Follow
        </button>
        <button class="px-3 py-1 text-sm border rounded-md sm:px-4 sm:py-2 md:px-5 md:py-2">
          Edit Profile
        </button>
      </div>
      <p class="text-sm md:text-base">UMKT | SAINTEK | TEKNIK INFORMATIKA</p>
      <div class="flex gap-6 mt-2 text-sm">
        <span><strong>12</strong> posts</span>
        <span><strong>530</strong> followers</span>
        <span><strong>570</strong> following</span>
      </div>
    </div>
  </section>

  <!-- Feed Section -->
  <section class="max-w-5xl mx-auto p-4 grid grid-cols-3 gap-2">
    <img src="F2.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F3.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F4.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F5.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F6.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F7.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F8.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F9.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F10.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F11.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F12.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
    <img src="F13.jpeg" alt="feed" class="aspect-square object-cover rounded-lg">
  </section>



  <!-- Footer -->
  <footer class="p-6 text-center text-sm text-gray-500 border-t">
    Pemrograman web – Tailwind CSS 
  </footer>

</body>
</html>
