<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Instagram Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="ass.css">
</head>
<body class="bg-light">

  <!-- Header Profil -->
  <header class="bg-white border-bottom py-3">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-3 col-md-2">
          <img src="F1.jpeg" class="rounded-circle img-fluid border" alt="Foto Profil">
        </div>
        <div class="col-9 col-md-7">
          <h2 class="h5 mb-1">shrfmld15</h2>
          <p class="mb-1 text-muted small">UMKT | SAINTEK | TEKNIK INFORMATIKA</p>
          <div class="d-flex gap-3">
            <span><b>12</b> Post</span>
            <span><b>700</b> Followers</span>
            <span><b>10</b> Following</span>
          </div>
        </div>
        <div class="col-12 col-md-3 text-md-end mt-3 mt-md-0">
          <button class="btn btn-sm btn-primary">Follow</button>
          <button class="btn btn-sm btn-outline-secondary">Edit Profile</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Feed Foto -->
  <main class="container mt-4">
    <div class="row g-1">
      <!-- Gunakan col-4 supaya 3 kolom sejajar -->
      <!-- Tambahkan "ratio" agar tetap persegi -->
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F2.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 1">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F3.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 2">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F4.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 3">
        </div>
      </div>

      <!-- lanjutkan sampai 12 foto -->
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F5.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 4">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F6.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 5">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F7.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 6">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F8.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 7">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F9.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 8">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F10.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 9">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F11.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 10">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F12.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 11">
        </div>
      </div>
      <div class="col-4">
        <div class="ratio ratio-1x1">
          <img src="F13.jpeg" class="w-100 h-100 object-fit-cover" alt="foto 12">
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white text-center py-3 mt-4 border-top">
    <small class="text-muted">PEMROGRAMAN WEB | Bootstrap 5</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
